openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: Mystics Inventory API — multi-tenant inventory SaaS
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
  - name: bootstrap
  - name: organizations
  - name: warehouses
  - name: items
  - name: customers
  - name: suppliers
  - name: sales-orders
  - name: shipments
  - name: goods-receipts
  - name: customer-payments
  - name: supplier-payments
  - name: purchase-orders
  - name: stock
  - name: dashboard
  - name: reports
  - name: subscription
  - name: shopify
  - name: onboarding
  - name: team
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema: { $ref: "#/components/schemas/HealthStatus" }

  /me:
    get:
      operationId: getMe
      tags: [bootstrap]
      summary: Get the signed-in user, their active organization, and subscription state
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/MeResponse" }
        "401":
          description: Unauthorized
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }

  /organizations/current:
    get:
      operationId: getCurrentOrganization
      tags: [organizations]
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Organization" }
    patch:
      operationId: updateCurrentOrganization
      tags: [organizations]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/UpdateOrganizationBody" }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Organization" }

  /warehouses:
    get:
      operationId: listWarehouses
      tags: [warehouses]
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/Warehouse" }
    post:
      operationId: createWarehouse
      tags: [warehouses]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/CreateWarehousePayload" }
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Warehouse" }
  /warehouses/{id}:
    get:
      operationId: getWarehouse
      tags: [warehouses]
      parameters:
        - { in: path, name: id, required: true, schema: { type: integer } }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Warehouse" }
    patch:
      operationId: updateWarehouse
      tags: [warehouses]
      parameters:
        - { in: path, name: id, required: true, schema: { type: integer } }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/UpdateWarehousePayload" }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Warehouse" }
    delete:
      operationId: deleteWarehouse
      tags: [warehouses]
      parameters:
        - { in: path, name: id, required: true, schema: { type: integer } }
      responses:
        "204": { description: No Content }

  /items:
    get:
      operationId: listItems
      tags: [items]
      parameters:
        - { in: query, name: search, required: false, schema: { type: string } }
        - { in: query, name: lowStock, required: false, schema: { type: boolean } }
        - { in: query, name: warehouseId, required: false, schema: { type: integer } }
        - in: query
          name: leafOnly
          required: false
          schema: { type: boolean }
          description: When true, exclude parent (variant-bearing) items. Used by line-item pickers that must reference a stockable item.
        - in: query
          name: excludeVariants
          required: false
          schema: { type: boolean }
          description: When true, exclude variant rows (items whose parentItemId is set). Used by the items list to render parents as collapsible groups.
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/Item" }
    post:
      operationId: createItem
      tags: [items]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/CreateItemPayload" }
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Item" }
  /items/{id}:
    get:
      operationId: getItem
      tags: [items]
      parameters:
        - { in: path, name: id, required: true, schema: { type: integer } }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ItemDetail" }
    patch:
      operationId: updateItem
      tags: [items]
      parameters:
        - { in: path, name: id, required: true, schema: { type: integer } }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/UpdateItemPayload" }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Item" }
    delete:
      operationId: deleteItem
      tags: [items]
      parameters:
        - { in: path, name: id, required: true, schema: { type: integer } }
      responses:
        "204": { description: No Content }

  /items/{id}/variants:
    post:
      operationId: createItemVariants
      tags: [items]
      summary: Bulk-create variants under a parent item
      parameters:
        - { in: path, name: id, required: true, schema: { type: integer } }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/CreateVariantsPayload" }
