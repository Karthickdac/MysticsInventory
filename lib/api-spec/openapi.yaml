openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: Mystics Inventory API — multi-tenant inventory SaaS
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
  - name: bootstrap
  - name: organizations
  - name: warehouses
  - name: items
  - name: customers
  - name: suppliers
  - name: sales-orders
  - name: shipments
  - name: goods-receipts
  - name: customer-payments
  - name: supplier-payments
  - name: purchase-orders
  - name: stock
  - name: dashboard
  - name: reports
  - name: subscription
  - name: shopify
  - name: shiprocket
  - name: onboarding
  - name: team
  - name: admin
  - name: storage
    description: Object storage upload and serving endpoints.
paths:
  /storage/uploads/request-url:
    post:
      tags: [storage]
      operationId: requestUploadUrl
      summary: Request a presigned URL for file upload
      description: |
        Returns a presigned GCS URL for direct upload. The client sends JSON
        metadata here, then uploads the file directly to the returned URL.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UploadUrlRequest'
      responses:
        '200':
          description: Presigned upload URL generated.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UploadUrlResponse'
        '400':
          description: Missing or invalid required fields.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '500':
          description: Failed to generate upload URL.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
  /storage/public-objects/{filePath}:
    get:
      tags: [storage]
      operationId: getPublicObject
      summary: Serve a public asset from PUBLIC_OBJECT_SEARCH_PATHS
      parameters:
        - name: filePath
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Object content streamed with correct Content-Type.
          content:
            '*/*':
              schema:
                type: string
                format: binary
        '404':
          description: File not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
  /storage/objects/{objectPath}:
    get:
      tags: [storage]
      operationId: getStorageObject
      summary: Serve an object entity from PRIVATE_OBJECT_DIR
      parameters:
        - name: objectPath
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Object content streamed with correct Content-Type.
          content:
            '*/*':
              schema:
                type: string
                format: binary
        '404':
          description: Object not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema: { $ref: "#/components/schemas/HealthStatus" }

  /me:
    get:
      operationId: getMe
      tags: [bootstrap]
      summary: Get the signed-in user, their active organization, and subscription state
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/MeResponse" }
        "401":
          description: Unauthorized
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }

  /organizations/current:
    get:
      operationId: getCurrentOrganization
      tags: [organizations]
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Organization" }
    patch:
      operationId: updateCurrentOrganization
      tags: [organizations]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/UpdateOrganizationBody" }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Organization" }

  /warehouses:
    get:
      operationId: listWarehouses
      tags: [warehouses]
      parameters:
        - in: query
          name: includeVirtual
          required: false
          schema: { type: boolean }
          description: When true, include virtual job-worker warehouses in the result. Defaults to false.
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/Warehouse" }
    post:
      operationId: createWarehouse
      tags: [warehouses]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/CreateWarehousePayload" }
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Warehouse" }
  /warehouses/{id}:
    get:
      operationId: getWarehouse
      tags: [warehouses]
      parameters:
        - { in: path, name: id, required: true, schema: { type: integer } }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Warehouse" }
    patch:
      operationId: updateWarehouse
      tags: [warehouses]
      parameters:
        - { in: path, name: id, required: true, schema: { type: integer } }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/UpdateWarehousePayload" }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Warehouse" }
    delete:
      operationId: deleteWarehouse
      tags: [warehouses]
      parameters:
        - { in: path, name: id, required: true, schema: { type: integer } }
      responses:
        "204": { description: No Content }

  /items:
    get:
      operationId: listItems
      tags: [items]
      parameters:
        - { in: query, name: search, required: false, schema: { type: string } }
        - { in: query, name: lowStock, required: false, schema: { type: boolean } }
        - { in: query, name: warehouseId, required: false, schema: { type: integer } }
        - in: query
          name: leafOnly
          required: false
          schema: { type: boolean }
          description: When true, exclude parent (variant-bearing) items. Used by line-item pickers that must reference a stockable item.
        - in: query
          name: excludeVariants
          required: false
          schema: { type: boolean }
          description: When true, exclude variant rows (items whose parentItemId is set). Used by the items list to render parents as collapsible groups.
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/Item" }
    post:
      operationId: createItem
      tags: [items]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/CreateItemPayload" }
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Item" }
  /items/bulk-import:
    post:
      operationId: bulkImportItems
      tags: [items]
      summary: Bulk-import simple items from a CSV-like row payload
      description: >-
        Validates and (optionally) commits a batch of simple item rows. Variants,
        bundles and batch-tracked items are not supported through this endpoint —
        rows whose sku already exists as such an item are rejected with an error.
        Use `dryRun=true` to surface row-level errors before committing.
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/BulkImportItemsPayload" }
      responses:
        "200":
          description: Result of a dry-run preview, or a successful commit.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/BulkImportItemsResponse" }
        "400":
          description: Validation or per-row errors (commit is rejected).
          content:
            application/json:
              schema: { $ref: "#/components/schemas/BulkImportItemsResponse" }
  /items/lookup:
    get:
      operationId: lookupItemByCode
      tags: [items]
      summary: Resolve a scanned or typed code to an item
      description: >-
        Returns the item whose `barcode` matches the supplied code, falling back
        to `sku` if no barcode match exists. Used by the camera scanner and by
        power users who type a barcode into a search field. Scoped to the
        current organization.
      parameters:
        - in: query
          name: code
          required: true
          schema: { type: string }
          description: The barcode or SKU to resolve.
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Item" }
        "404":
          description: No item matches the supplied code in this organization.

  /items/{id}:
    get:
      operationId: getItem
      tags: [items]
      parameters:
        - { in: path, name: id, required: true, schema: { type: integer } }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ItemDetail" }
    patch:
      operationId: updateItem
      tags: [items]
      parameters:
        - { in: path, name: id, required: true, schema: { type: integer } }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/UpdateItemPayload" }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Item" }
    delete:
      operationId: deleteItem
      tags: [items]
      parameters:
        - { in: path, name: id, required: true, schema: { type: integer } }
      responses:
        "204": { description: No Content }

  /items/{id}/variants:
    post:
      operationId: createItemVariants
      tags: [items]
      summary: Bulk-create variants under a parent item
      parameters:
        - { in: path, name: id, required: true, schema: { type: integer } }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/CreateVariantsPayload" }
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/Item" }

  /items/{parentId}/variants/{variantId}:
    delete:
      operationId: deleteItemVariant
      tags: [items]
      summary: Delete a single variant under a parent
      parameters:
        - { in: path, name: parentId, required: true, schema: { type: integer } }
        - { in: path, name: variantId, required: true, schema: { type: integer } }
      responses:
        "204": { description: No Content }

  /items/{id}/adjust-stock:
    post:
      operationId: adjustItemStock
      tags: [stock]
      parameters:
        - { in: path, name: id, required: true, schema: { type: integer } }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/AdjustStockBody" }
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema: { $ref: "#/components/schemas/StockMovement" }

  /items/{id}/batches:
    get:
      operationId: listItemBatches
      tags: [items]
      parameters:
        - { in: path, name: id, required: true, schema: { type: integer } }
        - in: query
          name: warehouseId
          required: false
          schema: { type: integer }
          description: When set, only on-hand rows for that warehouse are returned. The `batches` array is empty when filtered.
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ItemBatchesResponse" }

  /stock-movements:
    get:
      operationId: listStockMovements
      tags: [stock]
      parameters:
        - { in: query, name: itemId, required: false, schema: { type: integer } }
        - { in: query, name: warehouseId, required: false, schema: { type: integer } }
        - { in: query, name: referenceType, required: false, schema: { type: string } }
        - { in: query, name: referenceId, required: false, schema: { type: integer } }
        - { in: query, name: purchaseOrderId, required: false, schema: { type: integer } }
        - { in: query, name: salesOrderId, required: false, schema: { type: integer } }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/StockMovement" }

  /customers:
    get:
      operationId: listCustomers
      tags: [customers]
      parameters:
        - { in: query, name: search, required: false, schema: { type: string } }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/Customer" }
    post:
      operationId: createCustomer
      tags: [customers]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/CreateCustomerPayload" }
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Customer" }
  /customers/{id}:
    get:
      operationId: getCustomer
      tags: [customers]
      parameters:
        - { in: path, name: id, required: true, schema: { type: integer } }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Customer" }
    patch:
      operationId: updateCustomer
      tags: [customers]
      parameters:
        - { in: path, name: id, required: true, schema: { type: integer } }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/UpdateCustomerPayload" }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Customer" }
    delete:
      operationId: deleteCustomer
      tags: [customers]
      parameters:
        - { in: path, name: id, required: true, schema: { type: integer } }
      responses:
        "204": { description: No Content }

  /suppliers:
    get:
      operationId: listSuppliers
      tags: [suppliers]
      parameters:
        - { in: query, name: search, required: false, schema: { type: string } }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/Supplier" }
    post:
      operationId: createSupplier
      tags: [suppliers]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/CreateSupplierPayload" }
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Supplier" }
  /suppliers/{id}:
    get:
      operationId: getSupplier
      tags: [suppliers]
      parameters:
        - { in: path, name: id, required: true, schema: { type: integer } }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Supplier" }
    patch:
      operationId: updateSupplier
      tags: [suppliers]
      parameters:
        - { in: path, name: id, required: true, schema: { type: integer } }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/UpdateSupplierPayload" }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Supplier" }
    delete:
      operationId: deleteSupplier
      tags: [suppliers]
      parameters:
        - { in: path, name: id, required: true, schema: { type: integer } }
      responses:
        "204": { description: No Content }

  /sales-orders:
    get:
      operationId: listSalesOrders
      tags: [sales-orders]
      parameters:
        - { in: query, name: status, required: false, schema: { type: string } }
        - { in: query, name: customerId, required: false, schema: { type: integer } }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/SalesOrder" }
    post:
      operationId: createSalesOrder
      tags: [sales-orders]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/CreateSalesOrderPayload" }
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema: { $ref: "#/components/schemas/SalesOrderDetail" }
  /sales-orders/{id}:
    get:
      operationId: getSalesOrder
      tags: [sales-orders]
      parameters:
        - { in: path, name: id, required: true, schema: { type: integer } }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/SalesOrderDetail" }
    patch:
      operationId: updateSalesOrder
      tags: [sales-orders]
      parameters:
        - { in: path, name: id, required: true, schema: { type: integer } }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/UpdateSalesOrderPayload" }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/SalesOrderDetail" }
    delete:
      operationId: deleteSalesOrder
      tags: [sales-orders]
      parameters:
        - { in: path, name: id, required: true, schema: { type: integer } }
      responses:
        "204": { description: No Content }

  /sales-orders/{id}/status:
    patch:
      operationId: updateSalesOrderStatus
      tags: [sales-orders]
      parameters:
        - { in: path, name: id, required: true, schema: { type: integer } }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/UpdateOrderStatusBody" }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/SalesOrderDetail" }

  /sales-orders/{id}/return:
    post:
      operationId: returnSalesOrder
      tags: [sales-orders]
      parameters:
        - { in: path, name: id, required: true, schema: { type: integer } }
      requestBody:
        required: false
        content:
          application/json:
            schema: { $ref: "#/components/schemas/ReturnOrderPayload" }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/SalesOrderDetail" }

  /sales-orders/{id}/invoice.pdf:
    get:
      operationId: downloadSalesOrderInvoice
      tags: [sales-orders]
      parameters:
        - { in: path, name: id, required: true, schema: { type: integer } }
      responses:
        "200":
          description: Invoice PDF binary
          content:
            application/pdf:
              schema:
                type: string
                format: binary

  /sales-orders/{id}/invoice/email:
    post:
      operationId: emailSalesOrderInvoice
      tags: [sales-orders]
      parameters:
        - { in: path, name: id, required: true, schema: { type: integer } }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/EmailInvoicePayload" }
      responses:
        "201":
          description: Email sent
          content:
            application/json:
              schema: { $ref: "#/components/schemas/EmailLog" }

  /sales-orders/{id}/email-log:
    get:
      operationId: listSalesOrderEmailLog
      tags: [sales-orders]
      parameters:
        - { in: path, name: id, required: true, schema: { type: integer } }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/EmailLog" }

  /sales-orders/{id}/payment-link:
    post:
      operationId: createSalesOrderPaymentLink
      tags: [payment-links]
      summary: Create a Razorpay payment link for an open invoice
      parameters:
        - { in: path, name: id, required: true, schema: { type: integer } }
      requestBody:
        required: false
        content:
          application/json:
            schema: { $ref: "#/components/schemas/CreatePaymentLinkPayload" }
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema: { $ref: "#/components/schemas/PaymentLink" }

  /sales-orders/{id}/payment-links:
    get:
      operationId: listSalesOrderPaymentLinks
      tags: [payment-links]
      parameters:
        - { in: path, name: id, required: true, schema: { type: integer } }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/PaymentLink" }

  /payment-links/{id}/cancel:
    post:
      operationId: cancelPaymentLink
      tags: [payment-links]
      parameters:
        - { in: path, name: id, required: true, schema: { type: integer } }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/PaymentLink" }

  /sales-orders/{id}/shipments:
    get:
      operationId: listSalesOrderShipments
      tags: [shipments]
      parameters:
        - { in: path, name: id, required: true, schema: { type: integer } }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/Shipment" }
    post:
      operationId: createSalesOrderShipment
      tags: [shipments]
      parameters:
        - { in: path, name: id, required: true, schema: { type: integer } }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/CreateShipmentPayload" }
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Shipment" }

  /shipments/{shipmentId}/cancel:
    post:
      operationId: cancelShipment
      tags: [shipments]
      parameters:
        - { in: path, name: shipmentId, required: true, schema: { type: integer } }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Shipment" }

  /purchase-orders:
    get:
      operationId: listPurchaseOrders
      tags: [purchase-orders]
      parameters:
        - { in: query, name: status, required: false, schema: { type: string } }
        - { in: query, name: supplierId, required: false, schema: { type: integer } }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/PurchaseOrder" }
    post:
      operationId: createPurchaseOrder
      tags: [purchase-orders]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/CreatePurchaseOrderPayload" }
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema: { $ref: "#/components/schemas/PurchaseOrderDetail" }
  /purchase-orders/{id}:
    get:
      operationId: getPurchaseOrder
      tags: [purchase-orders]
      parameters:
        - { in: path, name: id, required: true, schema: { type: integer } }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/PurchaseOrderDetail" }
    patch:
      operationId: updatePurchaseOrder
      tags: [purchase-orders]
      parameters:
        - { in: path, name: id, required: true, schema: { type: integer } }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/UpdatePurchaseOrderPayload" }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/PurchaseOrderDetail" }
    delete:
      operationId: deletePurchaseOrder
      tags: [purchase-orders]
      parameters:
        - { in: path, name: id, required: true, schema: { type: integer } }
      responses:
        "204": { description: No Content }

  /purchase-orders/{id}/status:
    patch:
      operationId: updatePurchaseOrderStatus
      tags: [purchase-orders]
      parameters:
        - { in: path, name: id, required: true, schema: { type: integer } }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/UpdateOrderStatusBody" }
      responses:
        "200":
