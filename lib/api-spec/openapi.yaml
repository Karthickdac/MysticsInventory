  /stock-transfers:
    get:
      operationId: listStockTransfers
      tags: [stockTransfers]
      parameters:
        - { in: query, name: status, schema: { type: string } }
        - { in: query, name: warehouseId, schema: { type: integer } }
        - { in: query, name: fromWarehouseId, schema: { type: integer } }
        - { in: query, name: toWarehouseId, schema: { type: integer } }
        - { in: query, name: itemId, schema: { type: integer } }
        - { in: query, name: fromDate, schema: { type: string }, description: "Inclusive start of transferDate range (YYYY-MM-DD)." }
        - { in: query, name: toDate, schema: { type: string }, description: "Inclusive end of transferDate range (YYYY-MM-DD)." }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/StockTransfer" }
    post:
      operationId: createStockTransfer
      tags: [stockTransfers]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/CreateStockTransferPayload" }
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema: { $ref: "#/components/schemas/StockTransferDetail" }

  /stock-transfers/{id}:
    get:
      operationId: getStockTransfer
      tags: [stockTransfers]
      parameters:
        - { in: path, name: id, required: true, schema: { type: integer } }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/StockTransferDetail" }
    patch:
      operationId: updateStockTransfer
      tags: [stockTransfers]
      parameters:
        - { in: path, name: id, required: true, schema: { type: integer } }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/UpdateStockTransferPayload" }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/StockTransferDetail" }
    delete:
      operationId: deleteStockTransfer
      tags: [stockTransfers]
      parameters:
        - { in: path, name: id, required: true, schema: { type: integer } }
      responses:
        "204": { description: No Content }

  /stock-transfers/{id}/dispatch:
    post:
      operationId: dispatchStockTransfer
      tags: [stockTransfers]
      parameters:
        - { in: path, name: id, required: true, schema: { type: integer } }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/StockTransferDetail" }

  /stock-transfers/{id}/complete:
    post:
      operationId: completeStockTransfer
      tags: [stockTransfers]
      parameters:
        - { in: path, name: id, required: true, schema: { type: integer } }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/StockTransferDetail" }

  /stock-transfers/{id}/cancel:
    post:
      operationId: cancelStockTransfer
      tags: [stockTransfers]
      parameters:
        - { in: path, name: id, required: true, schema: { type: integer } }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/StockTransferDetail" }

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status: { type: string }
      required: [status]

    Error:
      type: object
      properties:
        error: { type: string }
      required: [error]

    User:
      type: object
      properties:
        id: { type: integer }
        clerkUserId: { type: string }
        email: { type: string }
        name: { type: ["string", "null"] }
      required: [id, clerkUserId, email, name]

    Organization:
      type: object
      properties:
        id: { type: integer }
        name: { type: string }
        slug: { type: string }
        currency: { type: string }
        timezone: { type: string }
        gstNumber: { type: ["string", "null"] }
        addressLine1: { type: ["string", "null"] }
        addressLine2: { type: ["string", "null"] }
        city: { type: ["string", "null"] }
        state: { type: ["string", "null"] }
        postalCode: { type: ["string", "null"] }
        country: { type: ["string", "null"] }
        plan: { type: string }
        subscriptionStatus: { type: string }
        currentPeriodEnd: { type: ["string", "null"] }
        onboardingCompletedAt: { type: ["string", "null"] }
        createdAt: { type: string }
      required: [id, name, slug, currency, timezone, plan, subscriptionStatus, createdAt, gstNumber, addressLine1, addressLine2, city, state, postalCode, country, currentPeriodEnd, onboardingCompletedAt]

    UpdateOrganizationBody:
      type: object
      properties:
        name: { type: string }
        currency: { type: string }
        timezone: { type: string }
        gstNumber: { type: ["string", "null"] }
        addressLine1: { type: ["string", "null"] }
        addressLine2: { type: ["string", "null"] }
        city: { type: ["string", "null"] }
        state: { type: ["string", "null"] }
        postalCode: { type: ["string", "null"] }
        country: { type: ["string", "null"] }

    MeResponse:
      type: object
      properties:
        user: { $ref: "#/components/schemas/User" }
        organization: { $ref: "#/components/schemas/Organization" }
        role: { type: string }
      required: [user, organization, role]

    Warehouse:
      type: object
      properties:
        id: { type: integer }
        name: { type: string }
        code: { type: string }
        addressLine1: { type: ["string", "null"] }
        city: { type: ["string", "null"] }
        state: { type: ["string", "null"] }
        country: { type: ["string", "null"] }
        isDefault: { type: boolean }
        shopifyLocationId: { type: ["string", "null"] }
        shopifyLocationName: { type: ["string", "null"] }
        createdAt: { type: string }
      required:
        [
          id,
          name,
          code,
          isDefault,
          createdAt,
          addressLine1,
          city,
          state,
          country,
          shopifyLocationId,
          shopifyLocationName,
        ]

    CreateWarehousePayload:
      type: object
      properties:
        name: { type: string }
        code: { type: string }
        addressLine1: { type: ["string", "null"] }
        city: { type: ["string", "null"] }
        state: { type: ["string", "null"] }
        country: { type: ["string", "null"] }
        isDefault: { type: boolean }
      required: [name, code]

    UpdateWarehousePayload:
      type: object
      properties:
        name: { type: string }
        code: { type: string }
        addressLine1: { type: ["string", "null"] }
        city: { type: ["string", "null"] }
        state: { type: ["string", "null"] }
        country: { type: ["string", "null"] }
        isDefault: { type: boolean }
        shopifyLocationId: { type: ["string", "null"] }

    VariantOptions:
      type: object
      additionalProperties: true
      description: |
        Variant option metadata. On parent items it stores the axis definition
        as { axes: ["Size", "Color"] }. On variant items it stores the chosen
        axis values as { Size: "M", Color: "Red" }.

    Item:
      type: object
      properties:
        id: { type: integer }
        sku: { type: string }
        name: { type: string }
        description: { type: ["string", "null"] }
        category: { type: ["string", "null"] }
        unit: { type: string }
        salePrice: { type: number }
        purchasePrice: { type: number }
        hsnCode: { type: ["string", "null"] }
        taxRate: { type: number }
        reorderLevel: { type: number }
        totalStock: { type: number }
        stockAtWarehouse:
          type: ["number", "null"]
          description: On-hand stock at the warehouse passed via the warehouseId query param. Null when warehouseId is not supplied.
        imageUrl: { type: ["string", "null"] }
        parentItemId:
          type: ["integer", "null"]
          description: When set, this item is a variant of the referenced parent item.
        hasVariants:
          type: boolean
          description: True when this item is a parent that holds variants. Parents cannot appear on order/transfer/adjust lines.
        variantOptions:
          oneOf:
            - { $ref: "#/components/schemas/VariantOptions" }
            - { type: "null" }
        variantCount:
          type: integer
          description: Number of variant children. Always 0 for non-parent items.
        isBundle:
          type: boolean
          description: True when this item is a bundle whose stock is derived from its components. Bundles cannot appear on purchase orders, transfers, or stock adjustments.
        createdAt: { type: string }
      required:
        [
          id,
          sku,
          name,
          unit,
          salePrice,
          purchasePrice,
          taxRate,
          reorderLevel,
          totalStock,
          stockAtWarehouse,
          createdAt,
          description,
          category,
          hsnCode,
          imageUrl,
          parentItemId,
          hasVariants,
          variantOptions,
          variantCount,
          isBundle,
        ]

    ItemWarehouseStock:
      type: object
      properties:
        warehouseId: { type: integer }
        warehouseName: { type: string }
        quantity: { type: number }
      required: [warehouseId, warehouseName, quantity]

    VariantStock:
      type: object
      properties:
        item: { $ref: "#/components/schemas/Item" }
        stockByWarehouse:
          type: array
          items: { $ref: "#/components/schemas/ItemWarehouseStock" }
      required: [item, stockByWarehouse]

    BundleComponent:
      type: object
      properties:
        id: { type: integer }
        componentItemId: { type: integer }
        componentSku: { type: string }
        componentName: { type: string }
        quantityPerBundle: { type: number }
      required:
        [id, componentItemId, componentSku, componentName, quantityPerBundle]

    ItemDetail:
      type: object
      properties:
        item: { $ref: "#/components/schemas/Item" }
        stockByWarehouse:
          type: array
          items: { $ref: "#/components/schemas/ItemWarehouseStock" }
          description: For a bundle, the per-warehouse derived (assemblable) quantity rather than a stored stock row.
        variants:
          type: array
          items: { $ref: "#/components/schemas/VariantStock" }
          description: Children of this item when it is a parent. Empty for leaf items.
        components:
          type: array
          items: { $ref: "#/components/schemas/BundleComponent" }
          description: Components of this item when it is a bundle. Empty otherwise.
      required: [item, stockByWarehouse, variants, components]

    CreateItemPayload:
      type: object
      properties:
        sku: { type: string }
        name: { type: string }
        description: { type: ["string", "null"] }
        category: { type: ["string", "null"] }
        unit: { type: string }
        salePrice: { type: number }
        purchasePrice: { type: number }
        hsnCode: { type: ["string", "null"] }
        taxRate: { type: number }
        reorderLevel: { type: number }
        imageUrl: { type: ["string", "null"] }
        openingStock: { type: number }
        openingWarehouseId: { type: ["integer", "null"] }
        hasVariants:
          type: boolean
          description: When true, the new item is a parent with axes defined in `variantOptions`. Opening stock is ignored for parents.
        variantOptions:
          oneOf:
            - { $ref: "#/components/schemas/VariantOptions" }
            - { type: "null" }
        isBundle:
          type: boolean
          description: When true, the new item is a bundle. Components must be supplied and `openingStock` is rejected. Cannot be combined with `hasVariants=true`.
        components:
          type: array
          description: Required when `isBundle` is true. Each entry pairs a component item id with the quantity consumed per bundle.
          items:
            $ref: "#/components/schemas/BundleComponentInput"
      required: [sku, name, unit, salePrice, purchasePrice, taxRate, reorderLevel]

    UpdateItemPayload:
      type: object
      properties:
        sku: { type: string }
        name: { type: string }
        description: { type: ["string", "null"] }
        category: { type: ["string", "null"] }
        unit: { type: string }
        salePrice: { type: number }
        purchasePrice: { type: number }
        hsnCode: { type: ["string", "null"] }
        taxRate: { type: number }
        reorderLevel: { type: number }
        imageUrl: { type: ["string", "null"] }
        hasVariants:
          type: boolean
          description: "Toggle whether this item is a variant parent. Setting from false to true requires variantOptions in the same payload and the item must not itself be a variant. Setting from true to false is rejected if any child variants still exist."
        variantOptions:
          oneOf:
            - { $ref: "#/components/schemas/VariantOptions" }
            - { type: "null" }
        isBundle:
          type: boolean
          description: "Toggle whether this item is a bundle. Sending a `components` array replaces the previous component list."
        components:
          type: array
          items:
            $ref: "#/components/schemas/BundleComponentInput"

    BundleComponentInput:
      type: object
      properties:
        componentItemId: { type: integer }
        quantityPerBundle: { type: number }
      required: [componentItemId, quantityPerBundle]

    CreateVariantInput:
      type: object
      properties:
        sku: { type: string }
        name: { type: ["string", "null"] }
        options:
          type: object
          additionalProperties: { type: string }
          description: "Map of axis name to chosen value, e.g. { Size: 'M', Color: 'Red' }. Must include exactly the parent's axes."
        salePrice: { type: ["number", "null"] }
        purchasePrice: { type: ["number", "null"] }
        imageUrl: { type: ["string", "null"] }
        openingStock: { type: ["number", "null"] }
        openingWarehouseId: { type: ["integer", "null"] }
      required: [sku, options]

    CreateVariantsPayload:
      type: object
      properties:
        variants:
          type: array
          items: { $ref: "#/components/schemas/CreateVariantInput" }
          minItems: 1
      required: [variants]

    AdjustStockBody:
      type: object
      properties:
        warehouseId: { type: integer }
        quantity: { type: number }
        reason: { type: string }
        notes: { type: ["string", "null"] }
      required: [warehouseId, quantity, reason]

    StockMovement:
      type: object
      properties:
        id: { type: integer }
        itemId: { type: integer }
        itemName: { type: string }
        warehouseId: { type: integer }
        warehouseName: { type: string }
        movementType: { type: string }
        quantity: { type: number }
        referenceType: { type: ["string", "null"] }
        referenceId: { type: ["integer", "null"] }
        notes: { type: ["string", "null"] }
        createdAt: { type: string }
      required: [id, itemId, itemName, warehouseId, warehouseName, movementType, quantity, createdAt, referenceType, referenceId, notes]

    Customer:
      type: object
      properties:
        id: { type: integer }
        name: { type: string }
        email: { type: ["string", "null"] }
        phone: { type: ["string", "null"] }
        company: { type: ["string", "null"] }
        gstNumber: { type: ["string", "null"] }
        billingAddress: { type: ["string", "null"] }
        shippingAddress: { type: ["string", "null"] }
        notes: { type: ["string", "null"] }
        outstandingBalance: { type: number }
        createdAt: { type: string }
      required: [id, name, email, phone, company, gstNumber, billingAddress, shippingAddress, notes, outstandingBalance, createdAt]

    CreateCustomerPayload:
      type: object
      properties:
        name: { type: string }
        email: { type: ["string", "null"] }
        phone: { type: ["string", "null"] }
        company: { type: ["string", "null"] }
        gstNumber: { type: ["string", "null"] }
        billingAddress: { type: ["string", "null"] }
        shippingAddress: { type: ["string", "null"] }
        notes: { type: ["string", "null"] }
      required: [name]

    UpdateCustomerPayload:
      type: object
      properties:
        name: { type: string }
        email: { type: ["string", "null"] }
        phone: { type: ["string", "null"] }
        company: { type: ["string", "null"] }
        gstNumber: { type: ["string", "null"] }
        billingAddress: { type: ["string", "null"] }
        shippingAddress: { type: ["string", "null"] }
        notes: { type: ["string", "null"] }

    Supplier:
      type: object
      properties:
        id: { type: integer }
        name: { type: string }
        email: { type: ["string", "null"] }
        phone: { type: ["string", "null"] }
        company: { type: ["string", "null"] }
        gstNumber: { type: ["string", "null"] }
        address: { type: ["string", "null"] }
        notes: { type: ["string", "null"] }
        outstandingPayable: { type: number }
        createdAt: { type: string }
      required: [id, name, email, phone, company, gstNumber, address, notes, outstandingPayable, createdAt]

    CreateSupplierPayload:
      type: object
      properties:
        name: { type: string }
        email: { type: ["string", "null"] }
        phone: { type: ["string", "null"] }
        company: { type: ["string", "null"] }
        gstNumber: { type: ["string", "null"] }
        address: { type: ["string", "null"] }
        notes: { type: ["string", "null"] }
      required: [name]

    UpdateSupplierPayload:
      type: object
      properties:
        name: { type: string }
        email: { type: ["string", "null"] }
        phone: { type: ["string", "null"] }
        company: { type: ["string", "null"] }
        gstNumber: { type: ["string", "null"] }
        address: { type: ["string", "null"] }
        notes: { type: ["string", "null"] }

    OrderLineInput:
      type: object
      properties:
        itemId: { type: integer }
        quantity: { type: number }
        unitPrice: { type: number }
        taxRate: { type: number }
        description: { type: ["string", "null"] }
      required: [itemId, quantity, unitPrice, taxRate]

    OrderLine:
      type: object
      properties:
        id: { type: integer }
        itemId: { type: integer }
        itemName: { type: string }
        sku: { type: string }
        variantOptions:
          type: ["object", "null"]
          additionalProperties: { type: string }
        quantity: { type: number }
        quantityShipped: { type: number }
        quantityReceived: { type: number }
        unitPrice: { type: number }
        taxRate: { type: number }
        lineSubtotal: { type: number }
        lineTax: { type: number }
        lineTotal: { type: number }
        description: { type: ["string", "null"] }
      required: [id, itemId, itemName, sku, variantOptions, quantity, quantityShipped, quantityReceived, unitPrice, taxRate, lineSubtotal, lineTax, lineTotal, description]

    SalesOrder:
      type: object
      properties:
        id: { type: integer }
        orderNumber: { type: string }
        customerId: { type: integer }
        customerName: { type: string }
        warehouseId: { type: integer }
        warehouseName: { type: string }
        status: { type: string }
        orderDate: { type: string }
        expectedShipDate: { type: ["string", "null"] }
        subtotal: { type: number }
        taxTotal: { type: number }
        total: { type: number }
        amountPaid: { type: number }
        balanceDue: { type: number }
        notes: { type: ["string", "null"] }
        createdAt: { type: string }
      required: [id, orderNumber, customerId, customerName, warehouseId, warehouseName, status, orderDate, expectedShipDate, subtotal, taxTotal, total, amountPaid, balanceDue, notes, createdAt]

    SalesOrderDetail:
      type: object
      properties:
        order: { $ref: "#/components/schemas/SalesOrder" }
        lines:
          type: array
          items: { $ref: "#/components/schemas/OrderLine" }
